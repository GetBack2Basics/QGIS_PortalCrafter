profile_metadata:
  id: "ecological"
  name: "Biodiversity Workspace"
  project_workspace: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/projects/ecological.qgz"

interface_customization:
  hidden_toolbars: ["mAdvancedDigitizingToolBar", "mRasterToolBar", "mSnappingToolBar"]
  hidden_docks: ["Browser", "ProcessingToolbox"]

menus:
  - name: "Environmental Constraints"
    submenus:
      - name: "Biodiversity Matrices"
        items:
          - name: "Terrestrial Biodiversity Zones"
            layer_name: "Terrestrial Biodiversity (LEP)"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/heritage/epi_terrestrial_biodiversity.shp"

          - name: "Biodiversity Values Map"
            layer_name: "Biodiversity Values Map (BVM)"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/environmental/bv_map.gpkg"

          - name: "Regional Corridors"
            layer_name: "Regional Biodiversity Corridors"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/heritage/regional_biodiversity_corridors.kml"

      - name: "Protected Estates & Vegetation"
        items:
          - name: "Estate Reserves"
            layer_name: "Estate Reserves (NPWS)"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/biodiversity/npws_estate_reserves.geojson"

          - name: "Littoral Rainforests Overlays"
            layer_name: "Littoral Rainforests (Protected)"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/environmental/littoral_rainforests.kml"

  - name: "Zoning & Land Management"
    submenus:
      - name: "Development Frameworks"
        items:
          - name: "Growth Centres Boundaries"
            layer_name: "Growth Centres Boundaries"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/environmental/growth_centres.sqlite"

          - name: "Land Use Zoning"
            layer_name: "Land Use Zoning (LEP)"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/zoning/nsw_lep_zoning.gpkg"

      - name: "Physiographic Hazards"
        items:
          - name: "Mine Subsidence Districts"
            layer_name: "Mine Subsidence Districts"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/environmental_hazards/mine_subsidence_districts.geojson"

          - name: "Watercourses Network"
            layer_name: "Hydrography Watercourses"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/hydrography/nsw_hydro_watercourses.geojson"

  - name: "Terrain & Foundations"
    submenus:
      - name: "High-Resolution Elevation"
        items:
          - name: "Hunter 1m Digital Elevation Model"
            layer_name: "Hunter 1m DEM (LiDAR)"
            provider: "gdal"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/raster/hunter_1m_dem.tif"
            scale_visibility:
              visible_zoomed_out_limit: 25000
              visible_zoomed_in_limit: 0

          - name: "Regional Aerial Orthophoto"
            layer_name: "Regional Aerial Orthophoto"
            provider: "gdal"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/raster/regional_ortho.tif"

custom_searches:
  - search_name: "Biodiversity zones"
    target_layer_name: "Terrestrial Biodiversity (LEP)"
    search_attribute: "LEP_NAME"
    comparison_operator: "Equals"
    ui_hint: "Search terrestrial biodiversity zones by LEP name."
    results_display_columns: ["LEP_NAME", "OBJECTID"]
    default_zoom_scale: 2500

  - search_name: "Reserve estates"
    target_layer_name: "Estate Reserves (NPWS)"
    search_attribute: "NAME"
    comparison_operator: "Equals"
    ui_hint: "Search NPWS estate reserves by reserve name."
    results_display_columns: ["NAME", "RESERVE_TYPE"]
    default_zoom_scale: 2500

  - search_name: "Mine subsidence districts"
    target_layer_name: "Mine Subsidence Districts"
    search_attribute: "DISTRICT_NAME"
    comparison_operator: "Equals"
    ui_hint: "Search mine subsidence district by district name."
    results_display_columns: ["DISTRICT_NAME", "SUB_TYPE"]
    default_zoom_scale: 2500
