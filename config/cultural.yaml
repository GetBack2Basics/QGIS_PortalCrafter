# config/cultural.yaml - Cultural Workspace Profile Specifications
profile_metadata:
  id: "cultural"
  name: "Cultural Workspace"
  project_workspace: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/projects/cultural.qgz"

interface_customization:
  hidden_toolbars: ["mAdvancedDigitizingToolBar", "mRasterToolBar", "mSnappingToolBar"]
  hidden_docks: ["Browser", "ProcessingToolbox"]

menus:
  - name: "Land Tenure & Infrastructure"
    submenus:
      - name: "Property Boundaries"
        items:
          - name: "Major Rural Parcels"
            layer_name: "Major Rural Parcels"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/cadastre/nsw_parcels_staging.gpkg"
              sql: "SELECT * FROM nsw_parcels_staging WHERE area_hectares >= 10"
            scale_visibility:
              visible_zoomed_out_limit: 250000
              visible_zoomed_in_limit: 0

          - name: "Standard Urban Lots"
            layer_name: "Standard Urban Lots"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/cadastre/nsw_parcels_staging.gpkg"
              sql: "SELECT * FROM nsw_parcels_staging WHERE area_hectares < 10"
            scale_visibility:
              visible_zoomed_out_limit: 150000
              visible_zoomed_in_limit: 0

      - name: "Transport Network"
        items:
          - name: "State Highways"
            layer_name: "State Highways"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/transport/nsw_roads_staging.sqlite"
              sql: "SELECT * FROM nsw_roads_staging WHERE roadType = 'Highway'"

          - name: "Local Streets"
            layer_name: "Local Streets"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/transport/nsw_roads_staging.sqlite"
              sql: "SELECT * FROM nsw_roads_staging WHERE roadType NOT IN ('Highway', 'State Road')"
            scale_visibility:
              visible_zoomed_out_limit: 50000
              visible_zoomed_in_limit: 0

          - name: "Rail Infrastructure"
            layer_name: "Rail Network"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/infrastructure/railways.kml"

  - name: "Statutory Heritage & Rights"
    submenus:
      - name: "Heritage Registers"
        items:
          - name: "State Heritage Curtilages"
            layer_name: "State Heritage Register"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/heritage/state_heritage_register.geojson"

      - name: "Indigenous & Customary Land"
        items:
          - name: "Native Title Claims"
            layer_name: "Native Title Claims"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/administrative/native_title_claims.gpkg"

  - name: "Base Imagery & Elevation"
    submenus:
      - name: "Raster Foundation Layers"
        items:
          - name: "Regional Aerial Orthophoto"
            layer_name: "Regional Aerial Orthophoto"
            provider: "gdal"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/raster/regional_ortho.tif"

          - name: "Statewide 10m Digital Elevation Model"
            layer_name: "Statewide 10m DEM"
            provider: "gdal"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/library/raster/nsw_statewide_10m_dem.tif"
