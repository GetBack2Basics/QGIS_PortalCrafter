# config/ecological.yaml - Ecological Workspace Profile Specifications
profile_metadata:
  id: "ecological"
  name: "Ecological Workspace"
  project_workspace: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/projects/ecological.qgz"

interface_customization:
  hidden_toolbars: ["mAdvancedDigitizingToolBar", "mRasterToolBar", "mSnappingToolBar"]
  hidden_docks: ["Browser", "ProcessingToolbox"]

menus:
  - name: "Cadastre & Infrastructure"
    submenus:
      - name: "Property & Roads"
        items:
          - name: "Load Staging Parcels"
            layer_name: "Staging Property Boundaries (GPKG)"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/cadastre/nsw_parcels_staging.gpkg"
              layer_name: "nsw_parcels_staging"
          - name: "Load Local Roads"
            layer_name: "Staging Road Network (SpatiaLite)"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/roads/nsw_roads_staging.sqlite"
              layer_name: "nsw_roads_staging"

  - name: "Statutory Conservation & Heritage"
    submenus:
      - name: "Biodiversity & Planning"
        items:
          - name: "Load Core Ecosystem Constraints"
            layers:
              - layer_name: "BOS Biodiversity Values"
                provider: "ogr"
                connection_info:
                  path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/environmental/bv_map.gpkg"
                  layer_name: "bv_map"
                scale_visibility:
                  visible_zoomed_out_limit: 100000

              - layer_name: "Coastal Wetlands Protection"
                provider: "ogr"
                connection_info:
                  path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/environmental/wetlands/coastal_wetlands.shp"
                scale_visibility:
                  visible_zoomed_out_limit: 50000

              - layer_name: "Littoral Rainforests Reserves"
                provider: "ogr"
                connection_info:
                  path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/environmental/littoral_rainforests.kml"

          - name: "Terrestrial Biodiversity"
            layer_name: "Terrestrial Biodiversity Zones (SHP)"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/heritage/epi_terrestrial_biodiversity/epi_terrestrial_biodiversity.shp"
          - name: "Regional Biodiversity Corridors"
            layer_name: "Regional Biodiversity Corridors (KML)"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/heritage/regional_biodiversity_corridors.kml"
      - name: "Heritage Act Listings"
        items:
          - name: "State Heritage Curtilages"
            layer_name: "State Heritage Register (GeoJSON)"
            provider: "ogr"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/heritage/state_heritage_register.geojson"

  - name: "Elevation & Terrain Models"
    submenus:
      - name: "Regional Terrain Datasets"
        items:
          - name: "State-wide 10m DEM"
            layer_name: "NSW Regional 10m Terrain Raster"
            provider: "gdal"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/raster/nsw_statewide_10m_dem.tif"
          - name: "Hunter Region 1m DTM"
            layer_name: "Hunter LiDAR 1m DTM (ELVIS Clip)"
            provider: "gdal"
            connection_info:
              path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/raster/hunter_1m_dem.tif"

      - name: "Administrative & Utility Overlays"
        items:
          - name: "Load Regional Governance & Infrastructure"
            layers:
              - layer_name: "Native Title Claims Area"
                provider: "ogr"
                connection_info:
                  path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/administrative/native_title_claims.gpkg"
                  layer_name: "native_title_claims"

              - layer_name: "LGA Boundaries Matrix"
                provider: "ogr"
                connection_info:
                  path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/administrative/local_gov/lga_boundaries.sqlite"
                  layer_name: "lga_boundaries"

              - layer_name: "Electricity Transmission Lines"
                provider: "ogr"
                connection_info:
                  path: "/media/george-corea/GIS/Projects/QGIS_PortalCrafter/input/infrastructure/power/transmission_lines.shp"
